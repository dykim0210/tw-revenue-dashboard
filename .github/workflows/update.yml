name: revenue-update

on:
  schedule:
    - cron: "0 12 5-13 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pandas lxml pyarrow requests
      - run: python collector.py
      - run: python analyzer.py
      - run: |
          git config user.name "revenue-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/ docs/data.js
          git diff --cached --quiet || git commit -m "monthly revenue update"
          git push
